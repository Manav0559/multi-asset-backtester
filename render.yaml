# Render Blueprint — free-tier "Portfolio Showcase Mode".
#
# ONE service: the FastAPI web process. No database, no Redis, no workers — the
# app runs backtests in-process (FastAPI BackgroundTasks), fans WebSocket events
# out over an in-process bus, and drives periodic jobs with an asyncio
# scheduler. Bring your own free Postgres (Neon/Supabase) via DATABASE_URL.
#
# Free web services sleep after ~15 min idle and cold-start in ~30s — fine for a
# demo link. Migrations run at container start (the free plan has no pre-deploy
# hook); they're idempotent.

services:
  - type: web
    name: backtester
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    # Start command lives in backend/start.sh (migrate to head, then serve) as the
    # image's CMD, so Render runs it verbatim. An inline dockerCommand with quotes
    # and `&&` exited 127 when the platform split it on whitespace and mangled the
    # quoting; $PORT is read inside the script instead.
    envVars:
      # Paste your Neon/Supabase DIRECT connection string here (in the Render
      # dashboard). Must start with postgresql+psycopg2:// and keep ?sslmode=require.
      - key: DATABASE_URL
        sync: false
      # Your Vercel URL, once the frontend is deployed (e.g. https://…vercel.app).
      - key: CORS_ORIGINS
        sync: false
      # Generated once; overrides the insecure dev default.
      - key: JWT_SECRET
        generateValue: true
