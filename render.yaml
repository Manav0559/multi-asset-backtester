# Render Blueprint — free-tier "Portfolio Showcase Mode".
#
# ONE service: the FastAPI web process. No database, no Redis, no workers — the
# app runs backtests in-process (FastAPI BackgroundTasks), fans WebSocket events
# out over an in-process bus, and drives periodic jobs with an asyncio
# scheduler. Bring your own free Postgres (Neon/Supabase) via DATABASE_URL.
#
# Free web services sleep after ~15 min idle and cold-start in ~30s — fine for a
# demo link. Migrations run at container start (the free plan has no pre-deploy
# hook); they're idempotent.

services:
  - type: web
    name: backtester
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    dockerCommand: "sh -c 'alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT'"
    envVars:
      # Paste your Neon/Supabase pooled connection string here (in the Render
      # dashboard). Must start with postgresql+psycopg2://
      - key: DATABASE_URL
        sync: false
      # Your Vercel URL, once the frontend is deployed (e.g. https://…vercel.app).
      - key: CORS_ORIGINS
        sync: false
      # Generated once; overrides the insecure dev default.
      - key: JWT_SECRET
        generateValue: true
