# Full-stack compose.
#
#   docker compose up -d                 → db only — the cheap dev loop; run the
#                                          backend + frontend locally against it.
#   docker compose --profile app up -d --build
#                                        → the whole platform in one network:
#                                          db, migrate, backend, frontend. No
#                                          redis/worker — one FastAPI process.
#
# db keeps host port 5433 so the local dev workflow is unchanged; inside the
# compose network services reach it on the default 5432.
services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: backtester-db
    # Hypertable bulk upserts lock one entry PER CHUNK: a 5y daily backfill
    # touches ~1250 day-chunks in one INSERT and exhausts the default lock
    # table (max_locks_per_transaction=64 -> "out of shared memory").
    command: ["postgres", "-c", "max_locks_per_transaction=1024"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: backtester
    ports:
      - "5433:5432"
    volumes:
      - backtester_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d backtester"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: bring the schema to head, then exit 0. Everything app-tier waits on
  # its successful completion so no service races an unmigrated DB.
  migrate:
    profiles: ["app"]
    build:
      context: ./backend
    image: backtester-backend
    command: ["alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/backtester
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  backend:
    profiles: ["app"]
    build:
      context: ./backend
    image: backtester-backend
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/backtester
      # Override in a real deployment — this is a dev default only.
      JWT_SECRET: ${JWT_SECRET:-dev-only-secret-change-me-in-production-0123456789}
    ports:
      # Overridable so the containerized stack can coexist with a local dev
      # backend already holding 8000.
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s


  frontend:
    profiles: ["app"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: backtester-frontend
    environment:
      # Server-side /api rewrite target (same compose network). NOTE: also baked
      # into the image at build time (see frontend/Dockerfile ARG BACKEND_URL).
      BACKEND_URL: http://backend:8000
    ports:
      # Overridable: 3000 is often held by another local dev server.
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      # 127.0.0.1, not localhost: busybox wget resolves localhost to ::1 first
      # and Node's standalone server binds IPv4 only.
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  backtester_pgdata:
