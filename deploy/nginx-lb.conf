# Plain round-robin LB over N backend replicas — deliberately NO sticky
# sessions: the platform's claim is that WS fan-out rides Redis, so any
# replica can serve any client and a fill on replica A reaches sockets on
# replica B. scripts/verify_scaleout.py proves exactly that through this LB.
events {}

http {
  # Docker's embedded DNS. Re-resolve every 5s and use a per-request variable
  # so nginx picks up all replica IPs (a static proxy_pass resolves once at
  # startup and pins a single replica — the opposite of the point).
  resolver 127.0.0.11 valid=5s ipv6=off;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
  }

  server {
    listen 8000;

    location / {
      set $upstream http://backend:8000;
      proxy_pass $upstream;
      proxy_http_version 1.1;
      # WebSocket upgrade passthrough (the /ws endpoint).
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 3600s;   # long-lived sockets must not idle out
      proxy_send_timeout 3600s;
    }
  }
}
